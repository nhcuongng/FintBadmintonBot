name: CI and CD to Vietnix

run-name: Deploy to Vietnix by @${{ github.actor }}

on:
  push:
    tags:
      - 'v*.*.*'
jobs:
  docker:
    runs-on: ubuntu-latest
    environment: secret
    env:
      PORT: 4000
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          # list of Docker images to use as base name for tags
          images: |
            nhcuong/cau-long-bot
          # generate Docker tags based on the following events/attributes
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha

      - name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Validate build configuration
        uses: docker/build-push-action@v7
        with:
          call: check

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Copy docker compose
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST_VIETNIX }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "compose.prod.yaml"
          target: "/app/cau-long-bot"
        
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          # Lấy chính xác version mà bước 'meta' đã xác định
          DEPLOY_TAG: ${{ steps.meta.outputs.version }}
          PORT: ${{ env.PORT }}
        with:
          host: ${{ secrets.SSH_HOST_VIETNIX }}
          username: ${{ secrets.SSH_USER }}
          envs: DEPLOY_TAG, PORT
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            export TAG=$DEPLOY_TAG
            export PORT=$PORT

            echo "Deploying version $TAG"
            echo "Deploying to port $PORT"
          
            cd /app/cau-long-bot
            
            # change name
            mv compose.prod.yaml compose.yaml

            # create env
            mkdir -p db
            echo "
              BOT_TOKEN=${{ secrets.BOT_TOKEN }}
              ADMIN_USERNAME=${{ secrets.ADMIN_USERNAME }}
            " >> .env

            docker compose pull
            docker compose up -d
            docker image prune -af  # Xóa image cũ để tiết kiệm ổ cứng VPS

            curl -f http://localhost:${{ env.PORT }}/restart-cron || exit 1